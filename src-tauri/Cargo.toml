[package]
name = "marketingstack"
version = "0.1.4"
description = "Marketingstack - Launch Claude Code for marketing sites"
authors = ["Julian Galluzzo"]
edition = "2021"

[lib]
name = "marketingstack_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["protocol-asset", "unstable"] }
tauri-plugin-opener = "2"
tauri-plugin-shell = "2"
tauri-plugin-pty = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
dirs = "5"
which = "6"
base64 = "0.22"
url = "2"
tauri-plugin-screenshots = "2.2.0"
tauri-plugin-fs = "2"
image = "0.25.9"
tauri-plugin-updater = "2.9.0"
tauri-plugin-process = "2.3.1"
lazy_static = "1.4"

