/* Enter inserts a line break (<br>); Cmd/Ctrl+Enter commits; Esc reverts. Clicking
   away (blur) also commits. */
document.addEventListener('keydown',function(e){if(!txtEditing)return;
  var mod=e.metaKey||e.ctrlKey;
  if(mod&&(e.key==='z'||e.key==='Z')){e.preventDefault();document.execCommand(e.shiftKey?'redo':'undo');place(hoverBox,txtEl);return;}
  if(mod&&(e.key==='y'||e.key==='Y')){e.preventDefault();document.execCommand('redo');place(hoverBox,txtEl);return;}
  if(e.key==='Enter'){e.preventDefault();if(mod){endText(true);}else{if(!document.execCommand('insertLineBreak'))document.execCommand('insertHTML',false,'<br>');place(hoverBox,txtEl);}}
