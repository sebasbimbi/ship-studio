name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
            updater_target: 'darwin-aarch64'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
            updater_target: 'darwin-x86_64'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Write Apple API key file
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          mkdir -p $RUNNER_TEMP/apple-keys
          echo "$APPLE_API_KEY_CONTENT" | base64 --decode > $RUNNER_TEMP/apple-keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        id: tauri
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application"
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/apple-keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Ship Studio v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Find and upload updater artifacts
        run: |
          # Find the .tar.gz and .sig files
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"

          echo "Looking in $BUNDLE_DIR"
          ls -la "$BUNDLE_DIR" || true

          # Find the tar.gz file
          TAR_FILE=$(find "$BUNDLE_DIR" -name "*.tar.gz" -type f | head -1)
          SIG_FILE=$(find "$BUNDLE_DIR" -name "*.sig" -type f | head -1)

          if [ -n "$TAR_FILE" ] && [ -n "$SIG_FILE" ]; then
            echo "Found tar: $TAR_FILE"
            echo "Found sig: $SIG_FILE"

            # Create artifacts directory with target-specific names
            mkdir -p artifacts
            cp "$TAR_FILE" "artifacts/ShipStudio_${{ matrix.updater_target }}.app.tar.gz"
            cp "$SIG_FILE" "artifacts/ShipStudio_${{ matrix.updater_target }}.app.tar.gz.sig"

            # Also save just the signature content
            cat "$SIG_FILE" > "artifacts/signature.txt"

            ls -la artifacts/
          else
            echo "Warning: Could not find updater artifacts"
            exit 1
          fi

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: updater-${{ matrix.updater_target }}
          path: artifacts/
          if-no-files-found: error

  create-manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo for release notes
        uses: actions/checkout@v4

      - name: Download all updater artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Read release notes
        id: release_notes
        run: |
          # Read RELEASE_NOTES.md and extract the content (skip the HTML comment)
          # Use a delimiter for multiline output
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          # Extract everything after "## What's New" line, strip markdown headers
          sed -n '/^## What/,$ p' RELEASE_NOTES.md | tail -n +2 | sed 's/^- /• /' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create latest.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ github.ref_name }}"
          # Use the public releases repo for download URLs
          RELEASES_REPO="ship-studio/releases"

          # Read signatures
          AARCH64_SIG=$(cat artifacts/updater-darwin-aarch64/signature.txt)
          X86_64_SIG=$(cat artifacts/updater-darwin-x86_64/signature.txt)

          echo "aarch64 signature: $AARCH64_SIG"
          echo "x86_64 signature: $X86_64_SIG"

          # Read release notes (escape for JSON)
          NOTES=$(cat << 'NOTES_EOF'
          ${{ steps.release_notes.outputs.notes }}
          NOTES_EOF
          )
          # Escape newlines and quotes for JSON
          NOTES_JSON=$(echo "$NOTES" | sed 's/"/\\"/g' | tr '\n' ' ' | sed 's/  */ /g' | sed 's/^ *//;s/ *$//')

          # Create the manifest using printf to avoid YAML parsing issues
          # URLs point to the PUBLIC releases repo so auto-updater can download
          printf '%s\n' '{' \
            "  \"version\": \"${VERSION}\"," \
            "  \"notes\": \"${NOTES_JSON}\"," \
            "  \"pub_date\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"," \
            '  "platforms": {' \
            '    "darwin-aarch64": {' \
            "      \"signature\": \"${AARCH64_SIG}\"," \
            "      \"url\": \"https://github.com/${RELEASES_REPO}/releases/download/${TAG}/ShipStudio_darwin-aarch64.app.tar.gz\"" \
            '    },' \
            '    "darwin-x86_64": {' \
            "      \"signature\": \"${X86_64_SIG}\"," \
            "      \"url\": \"https://github.com/${RELEASES_REPO}/releases/download/${TAG}/ShipStudio_darwin-x86_64.app.tar.gz\"" \
            '    }' \
            '  }' \
            '}' > latest.json

          echo "Generated latest.json:"
          cat latest.json

          # Validate JSON
          python3 -c "import json; json.load(open('latest.json'))" && echo "JSON is valid"

      # Upload to the PRIVATE main repo (for reference/backup)
      - name: Upload updater tarballs to main repo release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/updater-darwin-aarch64/ShipStudio_darwin-aarch64.app.tar.gz
            artifacts/updater-darwin-x86_64/ShipStudio_darwin-x86_64.app.tar.gz
            latest.json
          draft: true

      # Upload to the PUBLIC releases repo (for auto-updater)
      - name: Create release in public releases repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Create the release in the public repo (auto-published, no draft)
          gh release create "$TAG" \
            --repo ship-studio/releases \
            --title "Ship Studio v${VERSION}" \
            --notes "Auto-updater release for Ship Studio v${VERSION}. See the main repository for full release notes." \
            artifacts/updater-darwin-aarch64/ShipStudio_darwin-aarch64.app.tar.gz \
            artifacts/updater-darwin-x86_64/ShipStudio_darwin-x86_64.app.tar.gz \
            latest.json
