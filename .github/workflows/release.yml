name: Release

on:
  push:
    tags:
      - 'v*'
      - '!*-win'

jobs:
  # Run tests before building release artifacts
  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test:run

  build:
    needs: test
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
            updater_target: 'darwin-aarch64'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
            updater_target: 'darwin-x86_64'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        id: tauri
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          CSTAR_IDENTITY_SECRET: ${{ secrets.CSTAR_IDENTITY_SECRET }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application"
          # Notarization intentionally disabled: it requires an in-effect Apple
          # Developer agreement (was returning HTTP 403 and blocking every
          # release). The app is still Developer ID code-signed, which preserves
          # silent in-place auto-updates for existing users. New users install
          # via the one-command installer (scripts/install.sh), which strips the
          # Gatekeeper quarantine flag — so notarization isn't needed. To
          # re-enable, restore the APPLE_API_* env vars + the API-key step above.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Ship Studio v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Find and upload updater artifacts
        run: |
          # Find the .tar.gz and .sig files
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"

          echo "Looking in $BUNDLE_DIR"
          ls -la "$BUNDLE_DIR" || true

          # Find the tar.gz file
          TAR_FILE=$(find "$BUNDLE_DIR" -name "*.tar.gz" -type f | head -1)
          SIG_FILE=$(find "$BUNDLE_DIR" -name "*.sig" -type f | head -1)

          if [ -n "$TAR_FILE" ] && [ -n "$SIG_FILE" ]; then
            echo "Found tar: $TAR_FILE"
            echo "Found sig: $SIG_FILE"

            # Create artifacts directory with target-specific names
            mkdir -p artifacts
            cp "$TAR_FILE" "artifacts/ShipStudio_${{ matrix.updater_target }}.app.tar.gz"
            cp "$SIG_FILE" "artifacts/ShipStudio_${{ matrix.updater_target }}.app.tar.gz.sig"

            # Also save just the signature content
            cat "$SIG_FILE" > "artifacts/signature.txt"

            # Copy DMG for user downloads
            DMG_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
            DMG_FILE=$(find "$DMG_DIR" -name "*.dmg" -type f | head -1)
            if [ -n "$DMG_FILE" ]; then
              cp "$DMG_FILE" "artifacts/ShipStudio_${{ matrix.updater_target }}.dmg"
              echo "Found dmg: $DMG_FILE"
            fi

            ls -la artifacts/
          else
            echo "Warning: Could not find updater artifacts"
            exit 1
          fi

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v6
        with:
          name: updater-${{ matrix.updater_target }}
          path: artifacts/
          if-no-files-found: error

  create-manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo for release notes
        uses: actions/checkout@v6

      - name: Download all updater artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Read release notes
        id: release_notes
        run: |
          # Read RELEASE_NOTES.md and extract ONLY the current version's notes
          # Use a delimiter for multiline output
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          # Extract only the first "## What's New" section (stop at the next version header)
          awk '/^## What/{if(found)exit; found=1; next} found{print}' RELEASE_NOTES.md | sed 's/^- /• /' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create latest.json
        env:
          NOTES: ${{ steps.release_notes.outputs.notes }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ github.ref_name }}"
          # Use the public releases repo for download URLs
          RELEASES_REPO="ship-studio/releases"

          # Read signatures
          AARCH64_SIG=$(cat artifacts/updater-darwin-aarch64/signature.txt)
          X86_64_SIG=$(cat artifacts/updater-darwin-x86_64/signature.txt)

          echo "aarch64 signature: $AARCH64_SIG"
          echo "x86_64 signature: $X86_64_SIG"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg aarch64_sig "$AARCH64_SIG" \
            --arg aarch64_url "https://github.com/${RELEASES_REPO}/releases/download/${TAG}/ShipStudio_darwin-aarch64.app.tar.gz" \
            --arg x86_64_sig "$X86_64_SIG" \
            --arg x86_64_url "https://github.com/${RELEASES_REPO}/releases/download/${TAG}/ShipStudio_darwin-x86_64.app.tar.gz" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  signature: $aarch64_sig,
                  url: $aarch64_url
                },
                "darwin-x86_64": {
                  signature: $x86_64_sig,
                  url: $x86_64_url
                }
              }
            }' > latest.json

          echo "Generated latest.json:"
          cat latest.json

          # Validate JSON
          python3 -c "import json; json.load(open('latest.json'))" && echo "JSON is valid"

      # Carry forward Windows manifest AND installer so Windows auto-update
      # and the site's /latest/download Windows link keep working when this
      # macOS release flips the "latest" alias.
      #
      # NOTE: latest-windows.json and the .exe only live on the most recent
      # *-win release, NOT on the implicit "latest" release (which is a macOS
      # release without them). Always resolve the newest -win tag explicitly.
      # This step is best-effort: a missing/unavailable Windows asset must
      # never block the macOS release from publishing (that regression shipped
      # a broken auto-update chain in v0.6.4).
      - name: Carry forward Windows manifest and installer
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}
        run: |
          mkdir -p carry-forward
          # Pick the newest PUBLISHED -win release. `gh release list` returns
          # drafts first, so the old `[0]` grabbed an ancient draft (v0.6.0-win),
          # which is why every macOS release shipped a stale 0.6.0 Windows
          # manifest and broke Windows auto-update. Exclude drafts and take the
          # most recently published -win tag.
          WIN_TAG=$(gh release list --repo ship-studio/releases --limit 100 \
            --json tagName,isDraft,publishedAt \
            --jq '[.[] | select(.isDraft == false) | select(.tagName | endswith("-win"))]
                  | sort_by(.publishedAt) | last | .tagName // empty')
          if [ -z "$WIN_TAG" ]; then
            echo "::warning::No -win release found; skipping Windows carry-forward"
            exit 0
          fi
          echo "Carrying forward Windows assets from $WIN_TAG"
          gh release download "$WIN_TAG" \
            --repo ship-studio/releases \
            --pattern "latest-windows.json" \
            --pattern "ShipStudio_windows-x86_64-setup.exe" \
            --dir carry-forward \
            || echo "::warning::Could not download Windows assets from $WIN_TAG; skipping carry-forward"
          ls -la carry-forward/ || true

      # Upload to the PRIVATE main repo (for reference/backup)
      - name: Upload updater tarballs to main repo release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/updater-darwin-aarch64/ShipStudio_darwin-aarch64.app.tar.gz
            artifacts/updater-darwin-x86_64/ShipStudio_darwin-x86_64.app.tar.gz
            latest.json
          draft: true

      # Upload to public repo for auto-updater. Includes carry-forward
      # Windows manifest + installer so "latest" alias flip doesn't drop
      # Windows auto-update or the site's Windows download link.
      - name: Create release in public releases repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Required macOS assets + manifest. The Windows assets are appended
          # only if the carry-forward step actually produced them, so missing
          # Windows assets can never block the macOS auto-update release.
          ASSETS=(
            artifacts/updater-darwin-aarch64/ShipStudio_darwin-aarch64.app.tar.gz
            artifacts/updater-darwin-x86_64/ShipStudio_darwin-x86_64.app.tar.gz
            artifacts/updater-darwin-aarch64/ShipStudio_darwin-aarch64.dmg
            artifacts/updater-darwin-x86_64/ShipStudio_darwin-x86_64.dmg
            latest.json
          )
          if [ -f carry-forward/latest-windows.json ]; then
            ASSETS+=(carry-forward/latest-windows.json)
          else
            echo "::warning::latest-windows.json missing; publishing macOS release without it. Windows auto-update may need a manual re-publish of the latest -win manifest."
          fi
          if [ -f carry-forward/ShipStudio_windows-x86_64-setup.exe ]; then
            ASSETS+=(carry-forward/ShipStudio_windows-x86_64-setup.exe)
          else
            echo "::warning::Windows installer missing; the site's /latest/download Windows link will 404 until the next -win release or a manual upload."
          fi

          # Create the release in the public repo (auto-published, no draft)
          gh release create "$TAG" \
            --repo ship-studio/releases \
            --title "Ship Studio v${VERSION}" \
            --notes "Auto-updater release for Ship Studio v${VERSION}. See the main repository for full release notes." \
            "${ASSETS[@]}"
