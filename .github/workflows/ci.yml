name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default token scope for every job: read-only on repo contents. If a
# malicious config-time payload ever does execute, the token it sees
# can't push, can't open PRs, can't comment, can't touch issues.
# Individual jobs can override per-step if they need more.
permissions:
  contents: read

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Config integrity — runs FIRST, fast, fails the whole CI before
  # anything else loads suspicious files. Catches the "obfuscated payload
  # hidden behind whitespace on a config-file line" attack class
  # (see incident 2026-04-29). Cheap, deterministic, no deps.
  config-integrity:
    name: Config Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Anomalous-line-length scan
        run: bash scripts/check-config-integrity.sh

  # Frontend checks (fast)
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    needs: [config-integrity]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint:strict

      - name: Format check
        run: pnpm format:check

      - name: Run tests
        run: pnpm test:run

      - name: Pattern regression check
        run: pnpm check:patterns

      - name: LOC regression guard
        run: pnpm check:loc

      - name: Coverage floor
        # Floor set at current baseline (~5% lines, 16% branches, 4% functions).
        # Plan's aspirational target is 25% lines / 20% branches; raise
        # thresholds as more tests land (see Block 14 follow-ups).
        run: pnpm test:coverage --coverage.thresholds.lines=4 --coverage.thresholds.functions=4 --coverage.thresholds.branches=15 --coverage.thresholds.statements=4

  # Backend checks
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    needs: [config-integrity]
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Check formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Clippy
        env:
          CSTAR_IDENTITY_SECRET: ${{ secrets.CSTAR_IDENTITY_SECRET }}
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -A clippy::uninlined_format_args

      - name: Run tests
        env:
          CSTAR_IDENTITY_SECRET: ${{ secrets.CSTAR_IDENTITY_SECRET }}
        run: cargo test --manifest-path src-tauri/Cargo.toml

  # Build verification (PRs and main)
  build-check:
    name: Build Verification
    runs-on: macos-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Check Tauri build (no bundle)
        env:
          CSTAR_IDENTITY_SECRET: ${{ secrets.CSTAR_IDENTITY_SECRET }}
        run: pnpm tauri build --no-bundle
